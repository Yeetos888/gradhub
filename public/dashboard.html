<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal | Dashboard</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body class="dashboard-page">
    <div class="bg-gradient"></div>

    <nav class="navbar">
        <a href="/" class="brand">
            <div class="brand-icon">S</div>
            <span class="brand-name">StudentPortal</span>
        </a>
        <div class="nav-actions">
            <span id="user-display" class="user-greeting">Welcome, Student</span>
            <button id="logout-btn" class="btn btn-outline btn-sm">Logout</button>
        </div>
    </nav>

    <main class="container animate-fade-in">
        <header class="dashboard-header text-center">
            <h1 id="welcome-message">Welcome to your Portal</h1>
            <p id="student-major" class="text-muted">Loading profile...</p>
        </header>

        <section class="dashboard-grid">
            <div class="card glass">
                <div class="card-icon">📅</div>
                <h3>My Schedule</h3>
                <p>View your upcoming classes and meeting links.</p>
                <a href="/schedule" class="btn btn-primary">Check Schedule</a>
            </div>

            <div class="card glass">
                <div class="card-icon">📚</div>
                <h3>Courses</h3>
                <p>Browse available courses and academic resources.</p>
                <a href="/courses" class="btn btn-primary">View Courses</a>
            </div>

            <div class="card glass">
                <div class="card-icon">🏆</div>
                <h3>Grades</h3>
                <p>Check your performance and transcript.</p>
                <button class="btn btn-outline" disabled>Coming Soon</button>
            </div>
        </section>
    </main>

    <script>
        async function loadProfile() {
            try {
                const response = await fetch('/api/me', { credentials: 'include' });
                const data = await response.json();
                
                if (data.success) {
                    const student = data.user;
                    if (!student || student.type !== 'student') {
                        window.location.href = '/login';
                        return;
                    }
                    document.getElementById('user-display').textContent = `Welcome, ${student.first_name}`;
                    document.getElementById('welcome-message').textContent = `Hi, ${student.first_name}!`;
                    document.getElementById('student-major').textContent = `Major: ${student.major}`;
                } else {
                    window.location.href = '/login';
                }
            } catch (err) {
                console.error('Error loading profile:', err);
                window.location.href = '/login';
            }
        }

        document.getElementById('logout-btn').addEventListener('click', async () => {
            try {
                const response = await fetch('/api/logout', { method: 'POST', credentials: 'include' });
                const data = await response.json();
                if (data.success) {
                    window.location.href = '/login';
                }
            } catch (err) {
                console.error('Logout failed:', err);
            }
        });

        loadProfile();
    </script>
</body>
</html>
