<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal | Login</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="bg-gradient"></div>

    <nav class="navbar">
        <a href="/" class="brand">
            <div class="brand-icon">S</div>
            <span class="brand-name">StudentPortal</span>
        </a>
        <div class="nav-actions">
            <a href="/signup?role=student" class="btn btn-outline">Student Sign Up</a>
            <a href="/signup?role=mentor" class="btn btn-outline">Mentor Sign Up</a>
        </div>
    </nav>

    <main class="container">
        <div class="glass-card auth-container animate-fade-in">
            <header class="auth-header">
                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-subtitle">Sign in to continue your journey</p>
            </header>

            <form id="login-form">
                <div class="form-group">
                    <label class="form-label">Account Type</label>
                    <select name="role" id="login-role" class="form-input">
                        <option value="student">Student</option>
                        <option value="mentor">Mentor</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Username or Email</label>
                    <input type="text" name="identifier" class="form-input" placeholder="john@university.edu" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-input" placeholder="••••••••" required>
                </div>

                <div id="error-message" style="color: hsl(var(--clr-error)); font-size: 0.9rem; margin-bottom: 1rem; display: none;"></div>

                <div style="display: flex; justify-content: flex-end; margin-bottom: 1.5rem;">
                    <a href="#" class="auth-link" style="font-size: 0.85rem;">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    Log In <i class="fas fa-sign-in-alt"></i>
                </button>
            </form>

            <footer class="auth-footer">
                <p>Don't have an account? <a href="/signup" class="auth-link">Sign Up</a></p>
            </footer>
        </div>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const initialRole = urlParams.get('role');
        if (initialRole) {
            document.getElementById('login-role').value = initialRole;
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            const errorDiv = document.getElementById('error-message');

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                if (result.success) {
                    const role = document.getElementById('login-role').value;
                    window.location.href = role === 'mentor' ? '/mentor/dashboard' : '/dashboard';
                } else {
                    errorDiv.textContent = result.message;
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = 'Something went wrong. Please try again.';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
